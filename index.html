<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Web Page</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f3f4f6;
            color: #1f2937;
        }

        main {
            max-width: 700px;
            margin: 60px auto;
            padding: 24px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
        }

        h1 {
            margin-top: 0;
            font-size: 2rem;
        }

        p {
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <main>
        <h1>Welcome</h1>
        <p>This is a simple HTML web page.</p>
    </main>
</body>
</html>
